<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F6F3">
<title>BookBites</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F3;--bg2:#EFEEE9;--bg3:#E8E6DF;--card:#FFFFFF;--text:#2D2A26;--text2:#6B6560;--text3:#9E9890;--border:rgba(45,42,38,0.08);--shadow-sm:0 1px 4px rgba(45,42,38,0.06);--shadow-md:0 4px 20px rgba(45,42,38,0.09);--shadow-lg:0 8px 40px rgba(45,42,38,0.14);--radius:14px;--radius-sm:10px;--font-display:'Playfair Display',Georgia,serif;--font-body:'Source Sans 3',-apple-system,sans-serif;--font-mono:'IBM Plex Mono',monospace;--nav-h:64px}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;font-family:var(--font-body);font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;transition:color 0.2s}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}
.nav-btn.active{color:#C84B31}

/* SCREENS */
.screen{display:none;height:calc(100% - var(--nav-h));overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* DESKTOP LAYOUT */
@media(min-width:900px){
  .screen.active{display:flex}
  .main-panel{flex:0 0 480px;overflow-y:auto;padding-right:20px;border-right:1px solid var(--border)}
  .side-panel{flex:1;overflow-y:auto;padding-left:20px}
}

/* PULSE */
.pulse{display:flex;align-items:center;gap:14px;padding:20px 24px}
.pulse-ring{width:56px;height:56px;position:relative;flex-shrink:0}
.pulse-ring svg{width:56px;height:56px;transform:rotate(-90deg)}
.pulse-ring circle{fill:none;stroke-width:4.5;stroke-linecap:round}
.pulse-ring .bg{stroke:var(--bg2)}
.pulse-ring .fg{stroke:#1D9E75;transition:stroke-dashoffset 1s ease}
.pulse-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;font-weight:500}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp 0.4s ease both;cursor:pointer;margin:0 24px 12px}
.card:hover{box-shadow:var(--shadow-md)}
.card-vis{padding:24px 20px;position:relative;overflow:hidden}
.card-vis .v-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);opacity:0.1}
.card-vis .v-icon svg{width:64px;height:64px;stroke:#fff;stroke-width:1.2;fill:none}
.card-vis .v-type{font-size:9px;font-weight:500;letter-spacing:1px;color:rgba(255,255,255,0.6);margin-bottom:4px;position:relative}
.card-vis .v-title{font-family:var(--font-display);font-size:18px;line-height:1.3;color:#fff;position:relative;max-width:78%}
.card-body{padding:16px 20px}
.card-insight{font-size:14px;line-height:1.65;color:var(--text2);margin-bottom:14px}
.card-section{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.55}
.card-section .cs-label{font-size:10px;font-weight:500;letter-spacing:0.5px;margin-bottom:4px;display:block}
.card-section p{color:var(--text2);margin:0}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.card-tag{font-size:9px;padding:3px 8px;border-radius:6px;background:var(--bg2);color:var(--text3);font-weight:500}
.card-rating{display:flex;gap:6px;padding:0 20px 16px}
.rate-btn{flex:1;padding:11px 8px;border-radius:var(--radius-sm);border:1.5px solid;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;text-align:center}
.rate-got{border-color:#1D9E75;color:#0F6E56;background:rgba(29,158,117,0.05)}
.rate-shaky{border-color:#BA7517;color:#854F0B;background:rgba(186,117,23,0.05)}
.rate-new{border-color:#C84B31;color:#993C1D;background:rgba(194,85,58,0.05)}
.rate-btn:active{transform:scale(0.96)}

/* ACTION BOX */
.action-box{background:#0F6E56;border-radius:var(--radius-sm);padding:12px 14px;color:#fff}
.action-box .cs-label{color:rgba(255,255,255,0.7)}
.action-box p{color:#fff !important;font-weight:500}

/* FRAMEWORK TILES */
.fw-tiles{display:flex;gap:8px;margin:10px 0}
.fw-tile{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.fw-tile svg{width:20px;height:20px;stroke:var(--text2);stroke-width:1.8;fill:none;display:block;margin:0 auto 4px}
.fw-tile .fw-name{font-size:11px;font-weight:500;color:var(--text)}
.fw-tile .fw-sub{font-size:10px;color:var(--text3)}

/* BOOK PILLS */
.pills{display:flex;gap:8px;padding:0 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:16px}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.pill.active{color:#fff;border-color:transparent}
.pill.add{border-style:dashed;color:var(--text3)}

/* CHAPTER BAR */
.ch-bar{display:flex;gap:3px;margin:0 24px 8px}
.ch-seg{flex:1;height:8px;border-radius:4px;background:var(--bg3);cursor:pointer;transition:background 0.3s}
.ch-seg.done{background:#1D9E75}
.ch-seg.current{background:var(--text)}
.ch-label{font-size:11px;font-weight:500;letter-spacing:0.8px;color:var(--text3);margin:0 24px 12px}

/* PROGRESS */
.prog-bar{display:flex;align-items:center;gap:12px;margin:0 24px 6px}
.prog-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 0.6s}
.prog-label{font-size:12px;font-weight:500;color:var(--text3)}

/* LIBRARY MASONRY */
.masonry{padding:8px 16px;column-count:2;column-gap:10px}
@media(min-width:768px){.masonry{column-count:3}}
@media(min-width:1100px){.masonry{column-count:3}}
.mcard{break-inside:avoid;margin-bottom:10px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:box-shadow 0.3s,transform 0.25s;animation:fadeUp 0.4s ease both}
.mcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.mcard-vis{padding:16px 14px;position:relative;overflow:hidden;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end}
.mcard-vis .mv-icon{position:absolute;right:10px;bottom:10px;opacity:0.1}
.mcard-vis .mv-icon svg{width:44px;height:44px;stroke:#fff;stroke-width:1.2;fill:none}
.mcard-vis .mv-status{position:absolute;right:8px;top:8px;font-size:11px}
.mcard-vis .mv-type{font-size:8px;font-weight:500;letter-spacing:1px;color:rgba(255,255,255,0.6);margin-bottom:2px}
.mcard-vis .mv-title{font-family:var(--font-display);font-size:14px;line-height:1.3;color:#fff}
.mcard-body{padding:10px 14px;background:var(--card)}
.mcard-snip{font-size:11px;line-height:1.5;color:var(--text2)}
.mcard-book{font-size:8px;font-weight:600;color:var(--text3);letter-spacing:0.5px;margin-top:6px}
.mcard-used{padding:5px 14px 8px;background:var(--card);border-top:1px solid var(--border);font-size:9px;color:#1D9E75;font-weight:600}

/* QUOTE CARD */
.mcard.quote .mcard-vis{min-height:100px;align-items:center;justify-content:center;padding:20px 16px}
.mcard.quote .mv-title{font-style:italic;text-align:center;font-size:14px;line-height:1.4}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(45,42,38,0.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.overlay.open{display:flex;justify-content:center;align-items:flex-end}
@media(min-width:600px){.overlay.open{align-items:center;padding:24px}}
.sheet{background:var(--card);width:100%;max-height:92vh;border-radius:20px 20px 0 0;overflow-y:auto;animation:sheetUp 0.35s cubic-bezier(0.16,1,0.3,1)}
@media(min-width:600px){.sheet{max-width:500px;border-radius:20px}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bg3);margin:10px auto 0}
.sheet-head{padding:16px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.sheet-section{padding:14px 20px;border-top:1px solid var(--border)}
.sheet-section:first-of-type{border:none}
.ss-label{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text3);margin-bottom:6px}
.ss-text{font-size:14px;line-height:1.6;color:var(--text2)}

/* ADD BOOK */
.add-screen{display:none;position:fixed;inset:0;z-index:700;background:var(--bg);overflow-y:auto;padding:48px 24px}
.add-screen.open{display:block}
.add-screen h1{font-family:var(--font-display);font-size:24px;margin-bottom:16px}
.add-options{display:flex;gap:12px;margin-bottom:24px}
.add-opt{flex:1;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.2s}
.add-opt:hover{border-color:#C84B31}
.add-opt.selected{border-color:#C84B31;background:rgba(200,75,49,0.03)}
.add-opt svg{width:32px;height:32px;stroke:var(--text2);stroke-width:1.5;fill:none;margin:0 auto 10px;display:block}
.add-opt h3{font-size:14px;font-weight:600;margin-bottom:4px}
.add-opt p{font-size:12px;color:var(--text3);line-height:1.4}
.add-form{margin-top:16px}
.add-form label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;color:var(--text3);margin-bottom:6px;margin-top:14px}
.add-form input,.add-form textarea{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color 0.2s;background:var(--card)}
.add-form input:focus,.add-form textarea:focus{border-color:#C84B31}
.add-form textarea{min-height:60px;resize:vertical;font-size:14px}
.add-btns{display:flex;gap:8px;margin-top:20px}
.add-btns button{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer}
.btn-cancel{background:var(--bg2);color:var(--text2)}
.btn-go{background:#C84B31;color:#fff}
.file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;margin-top:12px;cursor:pointer;transition:border-color 0.2s}
.file-drop:hover{border-color:#C84B31}
.file-drop svg{width:40px;height:40px;stroke:var(--text3);stroke-width:1.5;fill:none;margin:0 auto 12px;display:block}
.file-drop p{font-size:13px;color:var(--text3)}
.file-drop .file-name{font-size:14px;font-weight:600;color:var(--text);margin-top:8px}

/* LOADING */
.loading{text-align:center;padding:40px 20px}
.spinner{width:36px;height:36px;border:3px solid var(--bg3);border-top-color:#C84B31;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
.loading p{font-size:13px;color:var(--text3)}

/* DIAGNOSTIC */
.diag{padding:24px;max-width:520px;margin:0 auto}
.diag-progress{display:flex;gap:4px;margin-bottom:20px}
.diag-progress .dp{flex:1;height:4px;border-radius:2px;background:var(--bg3);transition:background 0.3s}
.diag-progress .dp.done{background:#1D9E75}
.diag-progress .dp.current{background:var(--text)}
.diag-q{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.diag-q-num{font-size:10px;font-weight:600;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px}
.diag-q-text{font-size:15px;line-height:1.55;margin-bottom:16px}
.diag-opts{display:flex;flex-direction:column;gap:8px}
.diag-opt{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;font-size:13px;line-height:1.45;color:var(--text2);transition:all 0.15s}
.diag-opt:hover{border-color:var(--text);background:rgba(45,42,38,0.02)}
.diag-opt.selected{border-color:var(--text);background:rgba(45,42,38,0.04);color:var(--text);font-weight:500}
.diag-opt .radio{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.diag-opt.selected .radio{border-color:var(--text)}
.diag-opt.selected .radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--text)}
.diag-nav{display:flex;gap:8px;margin-top:16px}
.diag-nav button{flex:1;padding:13px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer}
.diag-back{background:var(--bg2);color:var(--text2)}
.diag-next{background:var(--text);color:#fff}

/* ASSESS RESULTS */
.assess{padding:24px;max-width:520px;margin:0 auto}
.assess h2{font-family:var(--font-display);font-size:22px;margin-bottom:16px}
.assess-score{display:flex;gap:12px;margin-bottom:20px}
.assess-score>div{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:16px;text-align:center}
.assess-score .big{font-size:28px;font-weight:500}
.assess-score .sub{font-size:12px;color:var(--text3);margin-top:2px}
.gap-item{display:flex;align-items:center;gap:10px;padding:6px 0}
.gap-label{font-size:12px;font-weight:500;width:90px;flex-shrink:0}
.gap-bar{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.gap-fill{height:100%;border-radius:3px;transition:width 1s}
.gap-pct{font-size:12px;font-weight:600;min-width:30px;text-align:right}
.path-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.path-pill{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;background:var(--text);color:#fff;font-size:13px;font-weight:600;z-index:800;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90%}
.toast.show{opacity:1}

/* FILTER CHIPS */
.filters{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f-chip{flex-shrink:0;padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.2s}
.f-chip.active{background:var(--text);color:#fff;border-color:var(--text)}

.purpose{font-size:12px;color:var(--text3);font-style:italic;margin:0 24px 16px}
</style>
</head>
<body>

<div class="screen active" id="sToday"></div>
<div class="screen" id="sLearn"></div>
<div class="screen" id="sLibrary"></div>

<nav class="nav">
  <button class="nav-btn active" onclick="go('sToday',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Today</button>
  <button class="nav-btn" onclick="go('sLearn',this)"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Learn</button>
  <button class="nav-btn" onclick="go('sLibrary',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Library</button>
  <button class="nav-btn" onclick="openAdd()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
</nav>

<div class="overlay" id="detailOverlay"></div>
<div class="add-screen" id="addScreen"></div>
<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ═══ SVG ICONS (inline, no CDN) ═══
const ICONS={
  map:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>',
  layers:'<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
  msg:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  check:'<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
  quote:'<path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 5v3c0 1 0 1 1 1z"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>',
  pulse:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  thumbs:'<path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M4 22H2V11h2"/>',
  info:'<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  upload:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  brain:'<path d="M12 2a7 7 0 017 7c0 3-2 5.5-4 7l-3 4-3-4c-2-1.5-4-4-4-7a7 7 0 017-7z"/>'
};
function icon(name,size=64){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||ICONS.info}</svg>`}
function iconColor(name,color,size=20){return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||ICONS.info}</svg>`}

// ═══ PALETTES ═══
const PAL=[
  {main:'#C2553A',mid:'#E07A5F',light:'#F4E0DA',name:'terracotta'},
  {main:'#2C3E6B',mid:'#5A6FA8',light:'#DFE4EF',name:'navy'},

// ═══ HELPERS ═══
function allCards(){return state.books.flatMap(b=>b.cards.map(c=>({...c,bookTitle:b.title,bookPal:b.palette,bookPurpose:b.purpose})))}
function findCard(id){for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(c)return{...c,bookTitle:b.title,bookPal:b.palette,bookPurpose:b.purpose}}return null}
function sEmoji(s){return s==='mastered'?'✅':s==='review'?'🔄':'🆕'}
function pct(b){if(!b.cards.length)return 0;return Math.round(b.cards.filter(c=>c.status==='mastered').length/b.cards.length*100)}
function masteryByTag(){const m={};allCards().forEach(c=>(c.tags||[]).forEach(t=>{if(!m[t])m[t]={tot:0,mas:0,rev:0};m[t].tot++;if(c.status==='mastered')m[t].mas++;if(c.status==='review')m[t].rev++}));const r={};for(const[t,d]of Object.entries(m))r[t]=Math.round(((d.mas+d.rev*0.4)/d.tot)*100);return r}

  if(id==='sLibrary')renderLibrary();
}

function renderLearn(){

  const chNames=Object.keys(chs);

  let h=`<div style="padding:32px 24px 12px"><div style="font-family:var(--font-display);font-size:24px;margin-bottom:4px">Learn</div><div style="font-size:13px;color:var(--text3)">Chapter by chapter, concept by concept</div></div>

  chNames.forEach((cn,ci)=>{

    if(unlocked){cc.forEach((c,i)=>{
      const cpal=PAL[b.palette%PAL.length];
      const cIcon=CARD_ICONS[c.cardType]||'info';
      const isQ=c.cardType==='quote';

          <div class="v-icon">${icon(cIcon)}</div>
          <div class="v-type" style="${isQ?'position:relative':''}">${TYPE_LABELS[c.cardType]||'💡 Concept'} ${sEmoji(c.status)}</div>
          <div class="v-title" style="${isQ?'font-style:italic;text-align:center;max-width:100%':''}">${isQ?'"'+c.conceptTitle.replace(/"/g,'')+'"':c.conceptTitle}</div>
        </div>
        <div class="card-body">
          <p class="card-insight">${c.insight}</p>
          ${c.frameworkVisual?`<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:12px;font-family:var(--font-mono);font-size:11px;line-height:2;text-align:center;color:var(--text2);margin-bottom:8px">${c.frameworkVisual.replace(/\n/g,'<br>')}</div>`:''}

// ═══ RATE & LOG ═══
function rate(id,rating){
  for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(!c)continue;
    if(rating==='mastered'){c.srs.reps++;c.srs.ease=Math.min(3,c.srs.ease+0.1);c.srs.interval=c.srs.interval===0?1:Math.round(c.srs.interval*c.srs.ease);c.status=c.srs.reps>=3?'mastered':'review'}
    else if(rating==='review'){c.srs.ease=Math.max(1.3,c.srs.ease-0.15);c.srs.interval=Math.max(1,Math.round(c.srs.interval*0.6));c.status='review'}
    else{c.srs.reps=0;c.srs.interval=0;c.srs.ease=2.5;c.status='new'}
    c.srs.next=Date.now()+c.srs.interval*86400000;
    const chs={};b.cards.forEach(cd=>{if(!chs[cd.chapter])chs[cd.chapter]=[];chs[cd.chapter].push(cd)});
    let ul=1;Object.keys(chs).forEach((cn,i)=>{const cc=chs[cn];const cm=cc.filter(x=>x.status==='mastered'||x.status==='review').length;if(cm/cc.length>=0.6)ul=Math.max(ul,i+2)});
    b.chaptersUnlocked=Math.min(ul,Object.keys(chs).length);
    save();break}
  closeDetail();renderAll();
  toast(rating==='mastered'?'Moving forward 🎯':rating==='review'?'See this again soon':'Starting fresh')}

function logUsed(id){for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(c){if(!c.useLogs)c.useLogs=[];c.useLogs.push(Date.now());c.srs.reps++;if(c.srs.reps>=3)c.status='mastered';else if(c.srs.reps>=1)c.status='review';break}}save();toast('Real application = deep learning 🎯');renderAll()}

// ═══ PDF PROCESSING ═══
async function processUpload(){
  if(!selectedFile){toast('Select a PDF first');return}
  const purpose=document.getElementById('bookPurposeIn')?.value.trim()||'';
  showLoading('Extracting text from PDF...');

  try{
    const buf=await selectedFile.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let fullText='';const pages=pdf.numPages;

    for(let i=1;i<=pages;i++){
      if(i%20===0)updateLoading(`Reading page ${i} of ${pages}...`);
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      const text=content.items.map(item=>item.str).join(' ');
      fullText+=text+'\n\n---PAGE_BREAK---\n\n';
    }

    updateLoading('Detecting chapters...');
    const chapters=detectChapters(fullText);

    updateLoading('Compressing and storing...');
    const title=selectedFile.name.replace('.pdf','').replace(/[_-]/g,' ');
    const compressed=compressText(fullText);

    const pi=state.books.length%PAL.length;
    const newBook={
      id:'book-'+Date.now(),title,purpose,palette:pi,
      chaptersUnlocked:1,phase:'hook',
      bookText:compressed,
      chapterMap:chapters,
      cards:[]
    };

    updateLoading('Generating first cards with AI...');
    const firstChapterText=decompressText(compressed).substring(0,4000);
    await generateInitialCards(newBook,firstChapterText);

    state.books.push(newBook);
    state.selectedBook=state.books.length-1;
    save();closeAdd();renderAll();
    toast(`"${title}" added with ${newBook.cards.length} concepts!`);
  }catch(e){
    console.error(e);
    hideLoading();
    toast('Error processing PDF — check console');
  }
}

function detectChapters(text){
  const lines=text.split('\n');
  const chapters=[];
  const chPattern=/^(chapter|ch\.?|part)\s*\d+/i;
  let currentCh='Introduction';let currentStart=0;

  lines.forEach((line,i)=>{
    const trimmed=line.trim();
    if(chPattern.test(trimmed)||(/^[A-Z\s]{10,50}$/.test(trimmed)&&trimmed.length<60)){
      if(i>currentStart+20){
        chapters.push({name:currentCh,startLine:currentStart,endLine:i});
        currentCh=trimmed.substring(0,60);currentStart=i;
      }
    }
  });
  chapters.push({name:currentCh,startLine:currentStart,endLine:lines.length});
  return chapters.length>0?chapters:[{name:'Full Book',startLine:0,endLine:lines.length}];
}

function compressText(text){
  try{return btoa(unescape(encodeURIComponent(text.substring(0,200000))))}
  catch(e){return btoa(unescape(encodeURIComponent(text.substring(0,50000))))}
}
function decompressText(data){
  try{return decodeURIComponent(escape(atob(data)))}catch(e){return''}
}

async function generateInitialCards(book,chapterText){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,
    messages:[{role:'user',content:`From this book text, generate 6 learning cards. Learner: operations manager, 100-200 employees, hospital document management.

Book text (first chapter): ${chapterText.substring(0,3000)}

Return ONLY valid JSON: {"cards":[{"chapter":"Ch N: Name","cardType":"concept|framework|quote","conceptTitle":"title","insight":"2-3 sentences","storyAnchor":"example or empty","situationChallenge":"ops scenario","actionPrompt":"micro-action","tags":["2-3 tags"],"chapterNum":1,"frameworkVisual":"for frameworks only, else empty"}]}

Rules: 4 concepts, 1 framework with visual, 1 quote. Make situation challenges specific to hospital ops management.`}]})});
    const data=await r.json();
    let txt=data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    if(parsed.cards){
      book.cards=parsed.cards.map((c,i)=>mc('pdf'+Date.now()+'_'+i,c.chapter||'Ch 1',c.cardType,c.conceptTitle,c.insight,c.storyAnchor||'',c.situationChallenge,c.actionPrompt,c.tags,c.chapterNum||1,c.frameworkVisual||''));
    }
  }catch(e){
    console.error('AI generation failed, creating placeholders',e);
    book.cards=[
      mc('ph'+Date.now()+'_0','Ch 1: Core Ideas','concept','Key concept from '+book.title,'The first key insight from this book will appear here. Open the app when connected to internet to generate AI-powered cards.','','How would you apply this book\'s main idea to your team?','Read the first chapter and note one actionable takeaway.',['leadership','self-awareness'],1),
      mc('ph'+Date.now()+'_1','Ch 1: Core Ideas','concept','Core Framework','The main framework from this book. Try regenerating when online for richer content.','','What framework from this book could you apply this week?','Identify the book\'s central model and sketch it on paper.',['decision-making','productivity'],1)
    ];
  }
}

// ═══ AI GENERATE (no PDF) ═══
async function generateAI(){
  const title=(document.getElementById('bookTitleIn')?.value||'').trim();
  const purpose=(document.getElementById('bookPurposeIn')?.value||'').trim();
  if(!title){toast('Enter a book title');return}
  showLoading('Claude is reading the book...');

  const steps=['Analyzing structure','Extracting concepts','Creating challenges','Building actions'];
  let si=0;const iv=setInterval(()=>{si=(si+1)%steps.length;updateLoading(steps[si])},2500);

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,
    messages:[{role:'user',content:`Generate learning cards for "${title}". Learner: operations manager, 100-200 employees, hospital document management. Purpose: "${purpose||'Apply in daily work'}".
Generate EXACTLY 8 cards across 3-4 chapters. Return ONLY valid JSON:
{"cards":[{"chapter":"Ch N: Theme","cardType":"concept|framework|quote","conceptTitle":"title","insight":"2-3 sentences","storyAnchor":"example or empty","situationChallenge":"ops scenario","actionPrompt":"micro-action","tags":["2-3 tags"],"chapterNum":1,"frameworkVisual":"for frameworks, else empty"}]}
Rules: 5 concepts, 2 frameworks with frameworkVisual, 1 quote.`}]})});
    clearInterval(iv);
    const data=await r.json();
    let txt=data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const pi=state.books.length%PAL.length;
    const nb={id:'book-'+Date.now(),title,purpose,palette:pi,chaptersUnlocked:1,phase:'learn',bookText:null,
      cards:parsed.cards.map((c,i)=>mc('ai'+Date.now()+'_'+i,c.chapter,c.cardType,c.conceptTitle,c.insight,c.storyAnchor||'',c.situationChallenge,c.actionPrompt,c.tags,c.chapterNum||1,c.frameworkVisual||''))};
    state.books.push(nb);state.selectedBook=state.books.length-1;save();closeAdd();renderAll();
    toast(`"${title}" added with ${nb.cards.length} concepts!`);
  }catch(e){
    clearInterval(iv);console.error(e);
    // Fallback to built-in library
    const fb=findFallback(title);
    const pi=state.books.length%PAL.length;
    if(fb){
      state.books.push({id:'book-'+Date.now(),title:fb.title,purpose:purpose||fb.purpose||'',palette:pi,chaptersUnlocked:1,phase:'learn',bookText:null,
        cards:fb.cards.map((c,i)=>mc('fb'+Date.now()+'_'+i,c.ch,c.type,c.t,c.i,c.s,c.sc,c.a,c.tags,c.cn,c.fw))});
      state.selectedBook=state.books.length-1;save();closeAdd();renderAll();
      toast(`"${fb.title}" added with ${fb.cards.length} concepts!`);
    }else{
      state.books.push({id:'book-'+Date.now(),title,purpose,palette:pi,chaptersUnlocked:1,phase:'learn',bookText:null,
        cards:[mc('ph'+Date.now(),'Ch 1: Core Ideas','concept','Key concept from '+title,'Cards will be generated when connected to internet. Try again later or upload the PDF.','','How would you apply this book\'s main idea?','Read the first chapter and note one takeaway.',['leadership','self-awareness'],1)]});
      state.selectedBook=state.books.length-1;save();closeAdd();renderAll();
      toast('Added — retry when online for richer cards');
    }
  }
}

function findFallback(title){
  const k=title.toLowerCase().replace(/[^a-z0-9]/g,'');
  for(const[key,val]of Object.entries(FALLBACK_BOOKS)){
    if(k.includes(key.substring(0,8))||key.includes(k.substring(0,8)))return val;
  }return null;
}
