<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F6F3">
<title>BookBites</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F3;--bg2:#EFEEE9;--bg3:#E8E6DF;--card:#FFFFFF;--text:#2D2A26;--text2:#6B6560;--text3:#9E9890;--border:rgba(45,42,38,0.08);--shadow-sm:0 1px 4px rgba(45,42,38,0.06);--shadow-md:0 4px 20px rgba(45,42,38,0.09);--shadow-lg:0 8px 40px rgba(45,42,38,0.14);--radius:14px;--radius-sm:10px;--font-display:'Playfair Display',Georgia,serif;--font-body:'Source Sans 3',-apple-system,sans-serif;--font-mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(255,255,255,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;height:64px;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;font-family:var(--font-body);font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;transition:color 0.2s;-webkit-tap-highlight-color:transparent}
.nav-tab svg{width:22px;height:22px;stroke-width:1.8}
.nav-tab.active{color:#C84B31}
.nav-tab.active svg{stroke:#C84B31}

.screen{display:none;padding-bottom:80px;min-height:100vh}
.screen.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TODAY */
.today-header{padding:48px 24px 20px}
.today-greeting{font-family:var(--font-display);font-size:28px;line-height:1.25;margin-bottom:4px}
.today-date{font-size:13px;color:var(--text3);font-weight:500}
.today-pulse{margin:20px 24px;padding:20px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:18px}
.pulse-ring{width:64px;height:64px;position:relative;flex-shrink:0}
.pulse-ring svg{width:64px;height:64px;transform:rotate(-90deg)}
.pulse-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.pulse-ring .bg{stroke:var(--bg2)}
.pulse-ring .fg{stroke:#2D6A4F;transition:stroke-dashoffset 1s ease}
.pulse-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:15px;font-weight:500}
.pulse-info h3{font-size:14px;font-weight:600;margin-bottom:2px}
.pulse-info p{font-size:12px;color:var(--text3);line-height:1.4}

.today-card{margin:16px 24px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeUp 0.5s ease both;cursor:pointer}
.today-card-visual{padding:28px 24px 20px;position:relative;overflow:hidden}
.today-card-visual::before{content:'';position:absolute;inset:0;opacity:0.07;background:repeating-linear-gradient(45deg,transparent,transparent 20px,currentColor 20px,currentColor 21px)}
.today-card-icon{font-size:28px;margin-bottom:10px;position:relative}
.today-card-title{font-family:var(--font-display);font-size:22px;line-height:1.3;position:relative;color:#fff}
.today-card-body{padding:20px 24px 24px}
.today-card-insight{font-size:14px;line-height:1.65;color:var(--text2);margin-bottom:16px}
.today-card-action{padding:14px 16px;border-radius:var(--radius-sm);font-size:13px;line-height:1.55}
.today-card-action strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;opacity:0.5}
.today-card-book{margin-top:14px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.today-yesterday{margin:16px 24px;padding:18px 20px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);animation:fadeUp 0.5s ease 0.1s both}
.today-yesterday h4{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.today-yesterday p{font-size:14px;font-weight:500;margin-bottom:12px}
.today-yest-btns{display:flex;gap:8px}
.today-yest-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:none;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.today-yest-btn:first-child:hover{background:#E9F5EF;border-color:#2D6A4F;color:#2D6A4F}
.today-yest-btn:last-child:hover{background:#FDF0EC;border-color:#C84B31;color:#C84B31}

/* LEARN */
.learn-header{padding:48px 24px 16px}
.learn-header h1{font-family:var(--font-display);font-size:26px;margin-bottom:4px}
.learn-header p{font-size:13px;color:var(--text3)}
.book-selector{padding:0 24px;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:8px}
.book-selector::-webkit-scrollbar{display:none}
.book-pill{flex-shrink:0;padding:10px 18px;border-radius:24px;border:2px solid var(--border);background:var(--card);font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.25s;white-space:nowrap}
.book-pill.active{color:#fff;border-color:transparent}
.book-pill.add-book-pill{border-style:dashed;color:var(--text3)}
.book-pill.add-book-pill:hover{border-color:#4A55A2;color:#4A55A2}
.learn-progress-bar{margin:20px 24px 8px;display:flex;align-items:center;gap:12px}
.learn-prog-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.learn-prog-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.learn-prog-label{font-size:12px;font-weight:600;color:var(--text3);white-space:nowrap}
.chapter-section{padding:8px 24px}
.chapter-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.learn-cards-list{display:flex;flex-direction:column;gap:12px}

/* Learn cards */
.lcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;transition:box-shadow 0.3s,transform 0.25s}
.lcard:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.lcard-visual{padding:20px;position:relative;overflow:hidden;min-height:100px;display:flex;flex-direction:column;justify-content:flex-end}
.tpl-diagonal::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 18px,rgba(255,255,255,0.1) 18px,rgba(255,255,255,0.1) 19px)}
.tpl-dots::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.15) 1.5px,transparent 1.5px);background-size:16px 16px}
.tpl-circles::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(255,255,255,0.12) 0%,transparent 50%),radial-gradient(circle at 20% 80%,rgba(255,255,255,0.08) 0%,transparent 40%)}
.tpl-grid::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.06) 1px,transparent 1px);background-size:24px 24px}
.tpl-waves::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 14px,rgba(255,255,255,0.05) 14px,rgba(255,255,255,0.05) 16px)}
.tpl-geo::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;border:20px solid rgba(255,255,255,0.08)}
.lcard-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.7);margin-bottom:6px;position:relative}
.lcard-title{font-family:var(--font-display);font-size:18px;line-height:1.3;color:#fff;position:relative}
.lcard-body{padding:16px 20px}
.lcard-insight{font-size:13px;line-height:1.6;color:var(--text2)}
.lcard-meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.lcard-tags{display:flex;gap:4px;flex-wrap:wrap}
.lcard-tag{font-size:9px;padding:3px 8px;border-radius:6px;background:var(--bg2);color:var(--text3);font-weight:600}
.lcard-status{font-size:16px}
.lcard-framework{margin:12px 0 4px;padding:12px;background:var(--bg);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:11px;line-height:2;text-align:center}
.lcard.quote-style .lcard-visual{min-height:140px;padding:28px 24px;justify-content:center;align-items:center}
.lcard.quote-style .lcard-title{font-size:20px;font-style:italic;text-align:center;line-height:1.45}

/* DETAIL MODAL */
.detail-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(45,42,38,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.detail-overlay.open{display:flex;justify-content:center;align-items:flex-end}
@media(min-width:600px){.detail-overlay.open{align-items:center;padding:24px}}
.detail-sheet{background:var(--card);width:100%;max-height:92vh;border-radius:20px 20px 0 0;overflow-y:auto;animation:sheetUp 0.35s cubic-bezier(0.16,1,0.3,1)}
@media(min-width:600px){.detail-sheet{max-width:500px;border-radius:20px}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-visual{padding:28px 24px 20px;position:relative;overflow:hidden}
.detail-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:16px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
.detail-body{padding:24px}
.detail-section{margin-top:20px}
.detail-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detail-section p{font-size:14px;line-height:1.65;color:var(--text2)}
.detail-action-box{padding:14px 16px;border-radius:var(--radius-sm);font-size:13px;line-height:1.55;margin-top:8px}
.detail-action-box strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;opacity:0.6}
.detail-related{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.detail-related-chip{padding:6px 12px;border-radius:8px;background:var(--bg2);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:background 0.2s}
.detail-related-chip:hover{background:var(--bg3)}
.detail-rating{display:flex;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.rate-btn{flex:1;padding:14px 8px;border-radius:var(--radius-sm);border:2px solid var(--border);background:none;font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center}
.rate-btn:active{transform:scale(0.96)}
.rate-got:hover{background:#E9F5EF;border-color:#2D6A4F;color:#2D6A4F}
.rate-shaky:hover{background:#FBF4E4;border-color:#B07D2B;color:#B07D2B}
.rate-new:hover{background:#FDF0EC;border-color:#C84B31;color:#C84B31}
.used-today-btn{width:100%;margin-top:10px;padding:12px;border-radius:var(--radius-sm);border:1.5px dashed var(--border);background:none;font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s}
.used-today-btn:hover{border-color:#2D6A4F;color:#2D6A4F;background:#E9F5EF}

/* LIBRARY */
.library-header{padding:48px 24px 12px}
.library-header h1{font-family:var(--font-display);font-size:26px;margin-bottom:4px}
.library-header p{font-size:13px;color:var(--text3)}
.library-filters{padding:8px 24px 12px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.library-filters::-webkit-scrollbar{display:none}
.lib-chip{flex-shrink:0;padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.lib-chip.active{background:var(--text);color:#fff;border-color:var(--text)}
.masonry{padding:8px 16px;column-count:2;column-gap:12px}
@media(min-width:768px){.masonry{column-count:3;padding:8px 24px}}
@media(min-width:1100px){.masonry{column-count:4}}
.mcard{break-inside:avoid;margin-bottom:12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow 0.3s,transform 0.25s;animation:fadeUp 0.4s ease both}
.mcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.mcard-visual{padding:18px 16px;position:relative;overflow:hidden;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end}
.mcard-type{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.65);margin-bottom:4px;position:relative}
.mcard-title{font-family:var(--font-display);font-size:15px;line-height:1.3;color:#fff;position:relative}
.mcard-body{padding:12px 16px;background:var(--card)}
.mcard-snippet{font-size:12px;line-height:1.55;color:var(--text2)}
.mcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.mcard-book{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.mcard-status{font-size:13px}
.mcard.mcard-quote .mcard-visual{min-height:110px;padding:22px 18px;justify-content:center;align-items:center}
.mcard.mcard-quote .mcard-title{font-style:italic;text-align:center;font-size:16px;line-height:1.4}

/* ADD BOOK OVERLAY */
.addbook-overlay{display:none;position:fixed;inset:0;z-index:700;background:var(--bg);overflow-y:auto}
.addbook-overlay.open{display:flex;flex-direction:column}
.addbook-content{max-width:480px;width:100%;margin:0 auto;padding:48px 24px 40px;flex:1}
.addbook-content h1{font-family:var(--font-display);font-size:26px;margin-bottom:16px}
.addbook-input{width:100%;padding:16px 20px;border:2px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:16px;outline:none;background:var(--card);transition:border-color 0.2s}
.addbook-input:focus{border-color:#4A55A2}
.addbook-hint{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5}
.addbook-btns{display:flex;gap:10px;margin-top:20px}
.addbook-btns button{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer}
.addbook-cancel{background:var(--bg2);color:var(--text2)}
.addbook-go{background:#4A55A2;color:#fff}
.addbook-go:disabled{opacity:0.5;cursor:not-allowed}
.addbook-loading{display:none;text-align:center;padding:40px 20px}
.addbook-loading.show{display:block}
.addbook-spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:#4A55A2;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}

/* ASSESSMENT */
.assess-overlay{display:none;position:fixed;inset:0;z-index:700;background:var(--bg);overflow-y:auto}
.assess-overlay.open{display:flex;flex-direction:column}
.assess-content{max-width:480px;width:100%;margin:0 auto;padding:48px 24px 40px;flex:1}
.assess-content h1{font-family:var(--font-display);font-size:26px;margin-bottom:16px}
.radar-wrap{display:flex;justify-content:center;margin:20px 0}
.radar-wrap svg{max-width:260px}
.assess-summary{background:var(--card);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:var(--shadow-sm)}
.assess-summary h3{font-size:14px;font-weight:700;margin-bottom:8px}
.assess-summary p{font-size:13px;line-height:1.6;color:var(--text2)}
.assess-gap{margin-top:12px}
.assess-gap-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.assess-gap-bar{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.assess-gap-fill{height:100%;border-radius:3px}
.assess-gap-label{font-size:12px;font-weight:600;width:100px;flex-shrink:0}
.assess-gap-pct{font-size:12px;font-weight:600;color:var(--text3);width:36px;text-align:right}
.assess-close{margin-top:24px;width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--text);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;background:var(--text);color:#fff;font-size:13px;font-weight:600;z-index:800;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90%}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="screen active" id="screenToday"></div>
<div class="screen" id="screenLearn"></div>
<div class="screen" id="screenLibrary"></div>

<nav class="bottom-nav">
  <button class="nav-tab active" data-screen="screenToday">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Today
  </button>
  <button class="nav-tab" data-screen="screenLearn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Learn
  </button>
  <button class="nav-tab" data-screen="screenLibrary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Library
  </button>
</nav>

<div class="detail-overlay" id="detailOverlay"></div>
<div class="addbook-overlay" id="addbookOverlay"></div>
<div class="assess-overlay" id="assessOverlay"></div>
<div class="toast" id="toast"></div>

<script>
const PALETTES=[{main:'#C84B31',bg:'#FDF0EC',mid:'#E8A090'},{main:'#4A55A2',bg:'#EDEEF8',mid:'#9EA3D0'},{main:'#2D6A4F',bg:'#E9F5EF',mid:'#8FC0A4'},{main:'#B07D2B',bg:'#FBF4E4',mid:'#D4B876'},{main:'#7B3F72',bg:'#F5ECF3',mid:'#C091B8'},{main:'#1B6B93',bg:'#E6F2F8',mid:'#7FB5D0'},{main:'#944E63',bg:'#F6ECF0',mid:'#C998AB'}];
const TPLS=['tpl-diagonal','tpl-dots','tpl-circles','tpl-grid','tpl-waves','tpl-geo'];
function gp(i){return PALETTES[i%PALETTES.length]}
function gt(i){return TPLS[i%TPLS.length]}

let state={books:[],usedToday:[],assessments:[]};
let selectedBookIdx=0, libFilter='all';

function load(){const s=localStorage.getItem('bb2');if(s){state=JSON.parse(s);state.books.forEach(b=>{if(!b.chaptersUnlocked)b.chaptersUnlocked=1})}if(!state.books.length)loadPrebuilt();save()}
function save(){localStorage.setItem('bb2',JSON.stringify(state))}

function mc(id,ch,type,title,insight,story,challenge,action,tags,cn,fw){
return{id,chapter:ch,cardType:type,conceptTitle:title,insight,storyAnchor:story||'',situationChallenge:challenge,actionPrompt:action,tags:tags||[],chapterNum:cn||1,frameworkVisual:fw||'',status:'new',srs:{interval:0,ease:2.5,next:Date.now(),reps:0},useLogs:[]}}

function loadPrebuilt(){
state.books=[
{id:'nlp-at-work',title:'NLP at Work',purpose:'Handle TL conversations and team dynamics better',palette:0,chaptersUnlocked:2,diagnostic:[],cards:[
mc('n01','Ch 1: What is NLP','concept','The Map is Not the Territory','Every person operates from their own mental map — not reality itself. Conflicts arise when we assume our map is THE map.','Two managers given the same data reach opposite conclusions — neither wrong, just reading different maps.','Your TL disagrees with your process change approach. Before reacting, ask: what map are they reading?','In your next disagreement, pause and say "their map, not mine" — then ask one curious question.',['communication','self-awareness','leadership'],1),
mc('n02','Ch 1: What is NLP','concept','Response = Your Communication\'s Meaning','You intended encouragement but they heard criticism. The response IS the meaning — not your intention.','A manager praised someone publicly thinking they\'d love it. The employee was mortified — they hated spotlight.','You gave feedback intending to motivate, but they looked deflated. Who needs to adjust?','After any instruction today, watch the response. If not what you wanted, change YOUR communication.',['communication','self-awareness'],1),
mc('n03','Ch 2: Filters','framework','Deletion, Distortion & Generalization','Our brain handles millions of bits but consciousness manages ~134. Three filters do the work: Deletion, Distortion, Generalization.','Employee says "nobody ever listens." That\'s generalization — one experience becoming a universal rule.','Team member says "this always happens." Which filter? What question challenges it?','Listen for one generalization today — always, never, everyone. Ask: "Can you think of one exception?"',['communication','leadership','persuasion'],2,'🗑️ DELETION → What are they ignoring?\n🔀 DISTORTION → What meaning are they adding?\n🔄 GENERALIZATION → Rule from too few examples?'),
mc('n04','Ch 3: Rapport','concept','Matching & Mirroring','Rapport isn\'t liking — it\'s creating unconscious sameness. Matching posture, voice pace, breathing builds trust faster than words.','A consultant matched a hostile client\'s crossed arms and slow speech. Within 10 minutes — collaboration.','Resistant TL, arms crossed, flat voice. What two things would you match first?','In your next meeting, match ONE thing — speaking pace or posture — for 5 minutes.',['communication','persuasion','leadership'],3),
mc('n05','Ch 4: Rep Systems','concept','VAK: Visual, Auditory, Kinesthetic','People prefer different senses. Visual: "I see." Auditory: "sounds right." Kinesthetic: "I feel." Match their system.','Manager showed charts to a TL who never engaged. Switched to talking through data — instant engagement.','Employee says "something doesn\'t feel right." Which system? What language mirrors them?','Notice sensory words in one conversation today. Mirror them back.',['communication','persuasion','self-awareness'],4),
mc('n06','Ch 5: Precision','concept','Meta Model: Recovering Deleted Info','When people speak vaguely — "It\'s a problem" — critical info is deleted. The Meta Model gives surgical recovery questions.','Manager heard "process isn\'t working." Asked "which step?" — turns out one step, not the whole process.','Employee says "quality is suffering." What 3 precision questions unpack this?','When someone complains vaguely today, resist solving. Ask: "Specifically, which part?"',['communication','leadership','decision-making'],5),

mc('n08','Ch 5: Precision','quote','The quality of your life is the quality of your questions','Vague questions get vague answers. Precise questions reveal precise truths. The Meta Model upgrades question quality.','','What question have you been avoiding with your most challenging TL?','Ask yourself one precision question about a decision you\'ve been putting off.',['communication','self-awareness'],5)
]},

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function allCards(){return state.books.flatMap(b=>b.cards.map(c=>({...c,bookTitle:b.title,bookPalette:b.palette,bookPurpose:b.purpose})))}
function cardMeta(id){for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(c)return{...c,bookTitle:b.title,bookPalette:b.palette,bookPurpose:b.purpose,bookId:b.id}}return null}
function sE(s){return s==='mastered'?'✅':s==='review'?'🔄':'🆕'}
function masteryByTag(){const a=allCards(),m={};a.forEach(c=>(c.tags||[]).forEach(t=>{if(!m[t])m[t]={tot:0,mas:0,rev:0};m[t].tot++;if(c.status==='mastered')m[t].mas++;if(c.status==='review')m[t].rev++}));const r={};for(const[t,d]of Object.entries(m))r[t]=Math.round(((d.mas+d.rev*0.4)/d.tot)*100);return r}
function overallMastery(){const a=allCards();if(!a.length)return 0;return Math.round((a.reduce((s,c)=>s+(c.status==='mastered'?1:c.status==='review'?0.4:0),0)/a.length)*100)}

// TODAY
function renderToday(){
const a=allCards(),now=Date.now();
const due=a.filter(c=>c.status==='review'&&c.srs.next<=now);
const fresh=a.filter(c=>c.status==='new');
const tc=(due.length?due:fresh.length?fresh:a)[0];
const pal=tc?gp(tc.bookPalette):gp(0);
const m=overallMastery(),mc2=a.filter(c=>c.status==='mastered').length;
const circ=2*Math.PI*26,off=circ-(m/100)*circ;
const d=new Date(),days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const pool=[...due.slice(1),...fresh.slice(1),...a.filter(c=>c.status==='review')];
const yc=pool.length?pool[0]:null;

let h=`<div class="today-header"><div class="today-greeting">Good ${d.getHours()<12?'morning':d.getHours()<17?'afternoon':'evening'}, Sam</div><div class="today-date">${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}</div></div>
<div class="today-pulse"><div class="pulse-ring"><svg viewBox="0 0 64 64"><circle class="bg" cx="32" cy="32" r="26"/><circle class="fg" cx="32" cy="32" r="26" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><div class="pulse-pct">${m}%</div></div><div class="pulse-info"><h3>${mc2} of ${a.length} concepts mastered</h3><p>${state.books.length} book${state.books.length!==1?'s':''} in your library</p></div></div>`;

if(tc){h+=`<div class="today-card" onclick="openDetail('${tc.id}')"><div class="today-card-visual" style="background:${pal.main};color:${pal.main}"><div class="today-card-icon">${tc.cardType==='framework'?'📐':tc.cardType==='quote'?'💬':'💡'}</div><div class="today-card-title">${tc.conceptTitle}</div></div><div class="today-card-body"><div class="today-card-insight">${tc.insight}</div><div class="today-card-action" style="background:${pal.bg};color:${pal.main}"><strong>Today's action ↗</strong>${tc.actionPrompt}</div><div class="today-card-book">${tc.bookTitle} · ${tc.chapter}</div></div></div>`}

if(yc){h+=`<div class="today-yesterday"><h4>Yesterday's Concept</h4><p>${yc.conceptTitle}</p><div class="today-yest-btns"><button class="today-yest-btn" onclick="logUsed('${yc.id}')">✅ I used this</button><button class="today-yest-btn" onclick="openDetail('${yc.id}')">🔄 Review</button></div></div>`}

h+=`<div style="padding:8px 24px"><button onclick="openAssess()" style="width:100%;padding:14px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--card);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;color:var(--text2)">🧪 Test My Mastery</button></div>`;
document.getElementById('screenToday').innerHTML=h}

function logUsed(id){for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(c){if(!c.useLogs)c.useLogs=[];c.useLogs.push(Date.now());c.srs.reps++;c.srs.interval=Math.max(c.srs.interval,3)*1.5;c.srs.next=Date.now()+c.srs.interval*86400000;if(c.srs.reps>=3)c.status='mastered';else if(c.srs.reps>=1)c.status='review';break}}save();toast('Logged! Real application = deep learning 🎯');renderAll()}

function renderLearn(){
if(!state.books.length){document.getElementById('screenLearn').innerHTML=`<div class="learn-header"><h1>Learn</h1><p>Add your first book</p></div><div style="padding:24px;text-align:center"><button class="book-pill add-book-pill" onclick="openAddBook()" style="font-size:15px;padding:14px 28px">+ Add Your First Book</button></div>`;return}
const b=state.books[selectedBookIdx],pal=gp(b.palette);
const chs={};b.cards.forEach(c=>{if(!chs[c.chapter])chs[c.chapter]=[];chs[c.chapter].push(c)});
const chNames=Object.keys(chs);
const tot=b.cards.length,mas=b.cards.filter(c=>c.status==='mastered').length,rev=b.cards.filter(c=>c.status==='review').length;
const pct=tot?Math.round(((mas+rev*0.4)/tot)*100):0;

let h=`<div class="learn-header"><h1>Learn</h1><p>Chapter by chapter, concept by concept</p></div>
<div class="book-selector">${state.books.map((bk,i)=>{const p=gp(bk.palette);return`<button class="book-pill ${i===selectedBookIdx?'active':''}" style="${i===selectedBookIdx?`background:${p.main};border-color:${p.main}`:''}" onclick="selectedBookIdx=${i};renderLearn()">${bk.title}</button>`}).join('')}<button class="book-pill add-book-pill" onclick="openAddBook()">+ Add Book</button></div>
<div class="learn-progress-bar"><div class="learn-prog-track"><div class="learn-prog-fill" style="width:${pct}%;background:${pal.main}"></div></div><div class="learn-prog-label">${pct}% · ${mas}/${tot}</div></div>
<div style="padding:4px 24px 0"><div style="font-size:11px;color:var(--text3);font-style:italic">Purpose: ${b.purpose||'Not set'}</div></div>
<div class="chapter-section">`;

chNames.forEach((cn,ci)=>{
const unlocked=ci<(b.chaptersUnlocked||1);

h+=`<div class="chapter-title">${unlocked?'📖':'🔒'} ${cn} <span style="font-weight:400;color:var(--text3)">(${cm}/${cc.length})</span>${!unlocked?'<span style="font-size:10px;opacity:0.4"> Master 60% above to unlock</span>':''}</div>`;
if(unlocked){h+=`<div class="learn-cards-list">`;cc.forEach((c,i)=>{
const tpl=gt(i+ci*3),isQ=c.cardType==='quote';
const typeIcons={concept:'💡 Concept',framework:'📐 Framework',quote:'💬 Quote',challenge:'🔥 Challenge',bridge:'🔗 Bridge'};
let fw=c.frameworkVisual?`<div class="lcard-framework">${c.frameworkVisual.replace(/\n/g,'<br>')}</div>`:'';
h+=`<div class="lcard ${isQ?'quote-style':''}" onclick="openDetail('${c.id}')"><div class="lcard-visual ${tpl}" style="background:linear-gradient(135deg,${pal.main},${pal.mid})"><div class="lcard-type">${typeIcons[c.cardType]||'💡 Concept'}</div><div class="lcard-title">${isQ?'"'+c.conceptTitle.replace(/"/g,'')+'"':c.conceptTitle}</div></div><div class="lcard-body"><div class="lcard-insight">${c.insight.substring(0,120)}${c.insight.length>120?'...':''}</div>${fw}<div class="lcard-meta"><div class="lcard-tags">${(c.tags||[]).slice(0,3).map(t=>`<span class="lcard-tag">${t}</span>`).join('')}</div><div class="lcard-status">${sE(c.status)}</div></div></div></div>`});h+=`</div>`}});

function openDetail(id){
const c=cardMeta(id);if(!c)return;
const pal=gp(c.bookPalette),tpl=gt(c.id.charCodeAt(c.id.length-1));
const related=allCards().filter(x=>x.id!==c.id&&x.tags&&c.tags&&x.tags.some(t=>c.tags.includes(t))).slice(0,3);
const o=document.getElementById('detailOverlay');
o.innerHTML=`<div class="detail-sheet"><div class="detail-visual ${tpl}" style="background:linear-gradient(135deg,${pal.main},${pal.mid})"><button class="detail-close" onclick="closeDetail()">✕</button><div style="position:relative"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.6);margin-bottom:6px">${c.bookTitle} · ${c.chapter}</div><div style="font-family:var(--font-display);font-size:24px;color:#fff;line-height:1.3">${c.cardType==='quote'?'"'+c.conceptTitle.replace(/"/g,'')+'"':c.conceptTitle}</div></div></div>
<div class="detail-body">
<div class="detail-section" style="margin-top:0"><div class="detail-section-label">💡 The Insight</div><p>${c.insight}</p></div>
${c.storyAnchor?`<div class="detail-section"><div class="detail-section-label">📖 Story Anchor</div><p>${c.storyAnchor}</p></div>`:''}
${c.frameworkVisual?`<div class="detail-section"><div class="detail-section-label">📐 Framework</div><div class="lcard-framework">${c.frameworkVisual.replace(/\n/g,'<br>')}</div></div>`:''}
<div class="detail-section"><div class="detail-section-label">🎯 Situation Challenge</div><p>${c.situationChallenge}</p></div>
<div class="detail-section"><div class="detail-section-label">⚡ Your Action</div><div class="detail-action-box" style="background:${pal.bg};color:${pal.main}"><strong>Try this →</strong>${c.actionPrompt}</div></div>
${c.bookPurpose?`<div class="detail-section"><div class="detail-section-label">🧭 Your Purpose</div><p style="font-style:italic;color:var(--text3)">${c.bookPurpose}</p></div>`:''}
${related.length?`<div class="detail-section"><div class="detail-section-label">🔗 Related</div><div class="detail-related">${related.map(r=>`<span class="detail-related-chip" onclick="event.stopPropagation();closeDetail();setTimeout(()=>openDetail('${r.id}'),300)">↗ ${r.conceptTitle}</span>`).join('')}</div></div>`:''}
<div class="detail-rating"><button class="rate-btn rate-got" onclick="rateCard('${c.id}','mastered')">✅ Got it</button><button class="rate-btn rate-shaky" onclick="rateCard('${c.id}','review')">🔄 Shaky</button><button class="rate-btn rate-new" onclick="rateCard('${c.id}','new')">🆕 Revisit</button></div>
<button class="used-today-btn" onclick="logUsed('${c.id}');closeDetail()">📝 I used this concept today</button>
</div></div>`;
o.classList.add('open');document.body.style.overflow='hidden';
o.onclick=e=>{if(e.target===o)closeDetail()}}

function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');document.body.style.overflow=''}

function rateCard(id,rating){
for(const b of state.books){const c=b.cards.find(x=>x.id===id);if(!c)continue;
const now=Date.now();
if(rating==='mastered'){c.srs.reps++;c.srs.ease=Math.max(1.3,c.srs.ease+0.1);c.srs.interval=c.srs.interval===0?1:Math.round(c.srs.interval*c.srs.ease);c.status=c.srs.reps>=3?'mastered':'review'}
else if(rating==='review'){c.srs.ease=Math.max(1.3,c.srs.ease-0.15);c.srs.interval=Math.max(1,Math.round(c.srs.interval*0.6));c.status='review'}
else{c.srs.reps=0;c.srs.interval=0;c.srs.ease=2.5;c.status='new'}
c.srs.next=now+c.srs.interval*86400000;
// Chapter unlock
const chs={};b.cards.forEach(cd=>{if(!chs[cd.chapter])chs[cd.chapter]=[];chs[cd.chapter].push(cd)});
let ul=1;Object.keys(chs).forEach((cn,i)=>{const cc=chs[cn];const cm=cc.filter(x=>x.status==='mastered'||x.status==='review').length;if(cm/cc.length>=0.6)ul=Math.max(ul,i+2)});
b.chaptersUnlocked=Math.min(ul,Object.keys(chs).length);
save();break}
closeDetail();renderAll();
toast(rating==='mastered'?'Nice! Moving forward 🎯':rating==='review'?'Noted — see this again soon':'Reset — starting fresh')}

{ch:'Ch 4: Mastery',type:'concept',t:'The Plateau of Latent Potential',i:'Results are delayed. You work for weeks with no visible progress, then breakthrough comes all at once. Most people quit in the valley.',s:'Ice doesn\'t melt from 25° to 31°. At 32° — everything changes. The work before wasn\'t wasted.',sc:'A TL has been coaching their team for 3 weeks with no improvement. They want to give up. What do you say?',a:'Think of one area where you\'ve been putting in effort without results. Commit to 2 more weeks.',tags:['mindset','leadership','self-awareness'],cn:4},
{ch:'Ch 4: Mastery',type:'framework',t:'The Goldilocks Rule',i:'Peak motivation happens when working on tasks of just-manageable difficulty. Not too easy, not too hard.',s:'Video games keep you engaged by matching difficulty to skill level — always just hard enough.',sc:'An underperforming employee seems disengaged. Could the work be too easy or too hard?',a:'Check one person\'s current tasks — are they in the Goldilocks zone?',tags:['leadership','productivity','mindset'],cn:4,fw:'😴 TOO EASY → Boredom\n🎯 JUST RIGHT → Flow State\n😰 TOO HARD → Anxiety'}
]);
a('thinkingfastandslow','Thinking, Fast and Slow','Make better decisions by understanding cognitive biases',[
{ch:'Ch 1: Two Systems',type:'framework',t:'System 1 vs System 2',i:'System 1 is fast, automatic, emotional. System 2 is slow, deliberate, logical. Most decisions happen in System 1 — which is where biases live.',s:'You instantly dislike a candidate because they remind you of someone. That\'s System 1 hijacking your judgment.',sc:'A TL makes a snap judgment about an employee\'s attitude. How do you activate their System 2?',a:'Before your next important decision, pause 10 seconds. That pause activates System 2.',tags:['decision-making','self-awareness','leadership'],cn:1,fw:'⚡ SYSTEM 1 → Fast, automatic, effortless\n🧠 SYSTEM 2 → Slow, deliberate, effortful'},
{ch:'Ch 1: Two Systems',type:'concept',t:'Anchoring Effect',i:'The first number you see influences your estimate, even if irrelevant. In negotiations, whoever sets the first number wins the anchor.',s:'Judges given random dice rolls before sentencing gave longer sentences when the dice showed higher numbers.',sc:'You\'re negotiating vendor pricing. They quote ₹500K. Now every counter-offer orbits that anchor. How do you reset?',a:'In your next negotiation, set the first number. Watch how it shapes the conversation.',tags:['decision-making','persuasion'],cn:1},
{ch:'Ch 2: Heuristics',type:'concept',t:'Availability Bias',i:'We judge probability by how easily examples come to mind. Dramatic events feel more likely than common ones.',s:'After a plane crash, people drive instead of fly — even though driving is statistically far more dangerous.',sc:'A single employee error becomes "everyone makes mistakes." Is this availability bias in your TL?',a:'Next time something feels "common" at work, check actual data before acting.',tags:['decision-making','self-awareness'],cn:2},
{ch:'Ch 2: Heuristics',type:'concept',t:'Loss Aversion',i:'Losses feel ~2x worse than equivalent gains feel good. Losing ₹1000 hurts more than finding ₹1000 feels great.',s:'People keep losing stocks hoping they\'ll recover, but sell winning stocks immediately to lock in gains.',sc:'Framing a process change: "You\'ll gain 20% efficiency" vs "You\'ll lose 2 hours daily to inefficiency." Which lands harder?',a:'Reframe one message today using loss language instead of gain language. Notice the response.',tags:['persuasion','decision-making','leadership'],cn:2},
{ch:'Ch 3: Overconfidence',type:'concept',t:'Planning Fallacy',i:'We systematically underestimate time, costs, and risks of future actions. Projects always take longer than planned.',s:'The Sydney Opera House: estimated 7 years, took 16. Estimated $7M, cost $102M.',sc:'Your team estimates a process migration will take 2 weeks. What should your real estimate be?',a:'Take your next time estimate and multiply by 1.5. Track if that\'s more accurate.',tags:['decision-making','leadership','productivity'],cn:3},
{ch:'Ch 3: Overconfidence',type:'quote',t:'Nothing in life is as important as you think it is while you are thinking about it',i:'Focusing on something makes it seem bigger than it is. This "focusing illusion" distorts our priorities and happiness predictions.',s:'',sc:'A TL is fixated on one underperforming employee and neglecting 20 good ones. How do you reframe?',a:'What\'s consuming your attention right now? Step back — is it truly the most important thing?',tags:['self-awareness','decision-making','mindset'],cn:3}
]);
a('7habits','The 7 Habits of Highly Effective People','Build effectiveness through principle-centered leadership',[
{ch:'Ch 1: Be Proactive',type:'concept',t:'Circle of Influence vs Concern',i:'Focus energy on what you CAN control (Circle of Influence), not what worries you but you can\'t change (Circle of Concern).',s:'A manager complained about company policy for months. When they focused on what they could change — their team\'s process — results improved.',sc:'Your TL is frustrated about a client\'s unreasonable demands. Where is their Circle of Influence?',a:'List 3 things bothering you. Mark which ones you can actually influence. Focus only there.',tags:['leadership','self-awareness','mindset'],cn:1},
{ch:'Ch 2: Begin with End',type:'concept',t:'Begin With the End in Mind',i:'Start every task by defining the desired outcome. Without a clear end point, you\'re efficient at climbing the wrong ladder.',s:'A team spent 3 months building a report nobody used. They never asked: what decision does this report serve?',sc:'Before your next project kickoff, ask: what does success look like on the last day?',a:'For today\'s most important task, write the desired outcome BEFORE starting.',tags:['leadership','productivity','decision-making'],cn:2},
{ch:'Ch 3: First Things First',type:'framework',t:'The Eisenhower Matrix',i:'Categorize tasks by urgency × importance. Most people live in Urgent (Q1 & Q3) but growth happens in Important-Not-Urgent (Q2).',s:'A manager spent all day on emails (Q3) while strategic planning (Q2) kept getting pushed. Team stalled.',sc:'Your TL says they\'re "too busy" for coaching sessions. Where are they spending time?',a:'List your top 5 tasks today. How many are Q2 (important but not urgent)? Do one Q2 task first.',tags:['productivity','leadership','decision-making'],cn:3,fw:'📌 Q1: Urgent + Important → DO IT\n📗 Q2: Not Urgent + Important → SCHEDULE IT\n📧 Q3: Urgent + Not Important → DELEGATE IT\n🗑️ Q4: Neither → DELETE IT'},
{ch:'Ch 4: Think Win-Win',type:'concept',t:'Think Win-Win',i:'Seek agreements where both parties benefit. Win-Lose thinking damages long-term relationships. No Deal is better than a bad deal.',s:'Two departments fought over budget. Instead of splitting it, they found a shared project that served both.',sc:'Your team wants flexible hours. Client needs consistent coverage. What\'s the Win-Win?',a:'In your next negotiation, before pushing your position, ask: what does a win look like for THEM?',tags:['leadership','communication','persuasion'],cn:4},
{ch:'Ch 5: Seek First to Understand',type:'concept',t:'Empathic Listening',i:'Most people listen to reply, not to understand. Empathic listening means reflecting feelings and meaning before giving your perspective.',s:'A TL came to complain about workload. Manager started with solutions. TL left feeling unheard. Next time, manager just listened first — TL left energized.',sc:'An employee says "I can\'t handle this anymore." Do you problem-solve or listen first?',a:'In one conversation today, only listen for 2 minutes. No advice, no solutions. Just reflect what they said.',tags:['communication','leadership','self-awareness'],cn:5},
{ch:'Ch 6: Synergize',type:'quote',t:'Strength lies in differences, not in similarities',i:'Synergy means the whole is greater than the sum of parts. It requires valuing differences instead of merely tolerating them.',s:'',sc:'Two TLs have opposite styles — one structured, one creative. How do you create synergy rather than conflict?',a:'Find one person who thinks very differently from you. Ask their perspective on a current challenge.',tags:['leadership','communication','self-awareness'],cn:6}
]);
a('crucialconversations','Crucial Conversations','Handle high-stakes emotional conversations with skill',[
{ch:'Ch 1: What Makes it Crucial',type:'concept',t:'The Crucial Conversation Triangle',i:'A conversation becomes crucial when stakes are high, opinions differ, and emotions run strong. Most people either go silent or go violent.',s:'A manager knew about a performance issue for 6 months. Kept avoiding it until it became a termination.',sc:'A TL is consistently missing SLAs but gets defensive when confronted. What makes this conversation crucial?',a:'Identify one conversation you\'ve been avoiding. Write down what makes it crucial.',tags:['communication','leadership'],cn:1},
{ch:'Ch 1: What Makes it Crucial',type:'framework',t:'Silence vs Violence Patterns',i:'Under stress, people either withdraw (silence: masking, avoiding, withdrawing) or attack (violence: controlling, labeling, attacking).',s:'In a heated meeting, one person goes quiet (silence). Another starts pointing fingers (violence). Both have left dialogue.',sc:'A TL goes silent when you give feedback, another gets aggressive. What pattern is each running?',a:'Notice your own pattern today under stress. Do you tend toward silence or violence?',tags:['communication','self-awareness'],cn:1,fw:'🤐 SILENCE\n→ Masking (sarcasm)\n→ Avoiding (steering away)\n→ Withdrawing (shutting down)\n\n💥 VIOLENCE\n→ Controlling (forcing)\n→ Labeling (name-calling)\n→ Attacking (belittling)'},
{ch:'Ch 2: Safety First',type:'concept',t:'Make It Safe',i:'When people feel unsafe, they leave dialogue. Before fixing the content, fix the safety. People can hear almost anything if they feel safe.',s:'A director gave brutal feedback. Employee shut down. Later, director started with shared purpose — employee opened up to the same feedback.',sc:'Your feedback meeting is going sideways. The person has crossed arms and one-word answers. How do you restore safety?',a:'Before your next difficult conversation, establish shared purpose: "I want this to work for both of us."',tags:['communication','leadership','persuasion'],cn:2},
{ch:'Ch 3: Master My Stories',type:'concept',t:'Master Your Stories',i:'Between what happens and how you feel is a story you tell yourself. You can change emotions by questioning your story.',s:'Manager saw employee on phone, assumed "slacking." Real story: employee was handling a family emergency.',sc:'Your TL seems disengaged in meetings. Before reacting, what stories might you be telling yourself that aren\'t facts?',a:'Next time you feel angry at someone\'s behavior, ask: "What story am I telling myself? What are other possible explanations?"',tags:['self-awareness','communication','leadership'],cn:3},
{ch:'Ch 3: Master My Stories',type:'concept',t:'STATE Your Path',i:'Share tough messages by: Share facts, Tell your story, Ask for their view, Talk tentatively, Encourage testing.',s:'Instead of "You\'re always late" (story), try "I\'ve noticed 3 late arrivals this week (facts). I\'m concerned it\'s affecting the team (my story). How do you see it? (ask)".',sc:'You need to tell a TL their quality scores are unacceptable. Script it using STATE.',a:'Prepare one difficult message using STATE: start with observable facts, not your story about the facts.',tags:['communication','leadership','persuasion'],cn:3}
]);
a('howtowinfriends','How to Win Friends and Influence People','Build stronger professional relationships',[
{ch:'Ch 1: Fundamental Techniques',type:'concept',t:'Don\'t Criticize, Condemn, or Complain',i:'Criticism puts people on the defensive and rarely changes behavior. Understanding why people act as they do is far more productive.',s:'Lincoln wrote furious letters to his generals — then never sent them. He learned that criticism only creates resentment.',sc:'A TL made a mistake that cost the team 2 hours. Your instinct is to reprimand. What does Carnegie suggest instead?',a:'Replace one criticism today with a question: "Help me understand what happened?"',tags:['communication','leadership'],cn:1},
{ch:'Ch 1: Fundamental Techniques',type:'concept',t:'Give Honest, Sincere Appreciation',i:'Everyone craves appreciation — not flattery. Specific, genuine recognition is the most powerful motivator available.',s:'A janitor was asked what the President said to make him feel important. "He called me by name and asked about my family."',sc:'When did you last genuinely appreciate a TL — not for output, but for who they are?',a:'Send one specific appreciation message today. Not "good job" but "I noticed how you handled X and it was impressive because Y."',tags:['leadership','communication','persuasion'],cn:1},
{ch:'Ch 2: Make People Like You',type:'concept',t:'Become Genuinely Interested in Others',i:'You make more friends in 2 months by being interested in others than in 2 years trying to get others interested in you.',s:'A salesperson stopped talking about products and started asking about the client\'s challenges. Sales doubled.',sc:'In your next 1:1 with a TL, spend the first 5 minutes asking about THEM, not about work.',a:'Ask one colleague a genuine personal question today. Listen fully to the answer.',tags:['communication','leadership','self-awareness'],cn:2},
{ch:'Ch 2: Make People Like You',type:'quote',t:'A person\'s name is the sweetest sound in any language',i:'Using someone\'s name creates instant connection. Forgetting it signals they don\'t matter to you.',s:'',sc:'How many of your 200 employees\' names do you know? What would change if you knew 20 more?',a:'Learn 3 new names today. Use each name once in conversation.',tags:['communication','leadership'],cn:2},
{ch:'Ch 3: Win People to Your Thinking',type:'concept',t:'Let the Other Person Feel the Idea Is Theirs',i:'People support what they help create. Instead of pushing your solution, ask questions that lead them to discover it.',s:'A manager wanted to change the shift schedule. Instead of announcing it, asked the team: "What would make our schedule work better?" They invented the same solution — and loved it.',sc:'You want TLs to adopt a new QC checklist. How do you make them feel they created it?',a:'In your next proposal, replace "I think we should..." with "What if we considered..."',tags:['persuasion','leadership','communication'],cn:3},
{ch:'Ch 3: Win People to Your Thinking',type:'concept',t:'Begin in a Friendly Way',i:'Starting hostile ensures the other person becomes defensive. A gentle opening makes the toughest conversations possible.',s:'A customer complaint letter started with praise for the company, then gently raised the issue. It got a personal response from the CEO.',sc:'You need to address poor attendance. Starting with "Your attendance is unacceptable" vs "I value your work and want to help you succeed here" — which opens dialogue?',a:'Before your next difficult conversation, plan a genuinely warm opening line.',tags:['communication','leadership','persuasion'],cn:3}
]);
a('deepwork','Deep Work','Maximize focused productivity and eliminate distraction',[
{ch:'Ch 1: Deep Work Is Valuable',type:'concept',t:'Deep Work vs Shallow Work',i:'Deep work: cognitively demanding tasks requiring uninterrupted focus. Shallow work: logistics, emails, meetings. Most people drown in shallow work and wonder why nothing meaningful gets done.',s:'Carl Jung built a stone tower retreat with no electricity to write his most important works. Depth requires structure.',sc:'How much of your day is deep work (strategy, coaching design) vs shallow (emails, approvals)? Track it honestly.',a:'Block one 90-minute deep work session tomorrow. No phone, no email, one important task.',tags:['productivity','self-awareness'],cn:1},
{ch:'Ch 1: Deep Work Is Valuable',type:'framework',t:'The 4 Disciplines of Deep Work',i:'Schedule deep work, embrace boredom, quit social media, drain the shallows. Deep work is a skill that atrophies without practice.',s:'',sc:'Your TLs say they can\'t find time for coaching. Could they be drowning in shallow work?',a:'Apply Discipline 1 — schedule a fixed time for deep work every day this week.',tags:['productivity','leadership','habits'],cn:1,fw:'📅 1. SCHEDULE → Fixed deep work time\n😐 2. EMBRACE BOREDOM → Train focus\n📱 3. QUIT SOCIAL MEDIA → Audit value\n🗑️ 4. DRAIN SHALLOWS → Minimize busywork'},
{ch:'Ch 2: Attention Residue',type:'concept',t:'Attention Residue',i:'When you switch tasks, part of your attention stays on the previous task. This "residue" reduces performance on the new task for up to 20 minutes.',s:'Checking email between two focused tasks doesn\'t take "just a second" — it leaves residue that degrades your next 20 minutes.',sc:'Your TLs multitask between floor supervision and reporting. Could attention residue explain quality drops?',a:'Before your next important task, close all unrelated tabs and apps. Give your brain 2 minutes to clear.',tags:['productivity','self-awareness','decision-making'],cn:2},
{ch:'Ch 2: Attention Residue',type:'concept',t:'The Craftsman Approach to Tools',i:'Don\'t adopt a tool because it offers ANY benefit. Adopt it only if its positives substantially outweigh negatives for what matters most.',s:'A writer quit all social media. Feared losing audience. Instead, writing quality soared, and the audience grew from better work.',sc:'Your team uses 6 different communication channels. Does each one truly add more value than distraction?',a:'List your digital tools. For each, ask: does this help my most important work or just keep me busy?',tags:['productivity','decision-making'],cn:2}
]);
a('startwithabywhy','Start with Why','Inspire action by leading with purpose',[
{ch:'Ch 1: The Golden Circle',type:'framework',t:'Why → How → What',i:'Most communicate What they do, then How. Inspiring leaders start with WHY — the purpose behind the action.',s:'Apple doesn\'t say "We make great computers." They say "We believe in challenging the status quo." The Why comes first.',sc:'When rolling out a new process, do you start with What (the steps) or Why (the purpose)?',a:'Rewrite one team communication today. Start with WHY before explaining WHAT.',tags:['leadership','communication','persuasion'],cn:1,fw:'🎯 WHY → Purpose, belief, cause\n🔧 HOW → Unique approach\n📦 WHAT → Product, service, output'},
{ch:'Ch 1: The Golden Circle',type:'concept',t:'People Don\'t Buy What You Do',i:'People buy WHY you do it. This applies to customers, employees, and teams. Purpose drives loyalty more than features.',s:'Nobody joined Martin Luther King because of his 12-point policy plan. They joined because "I have a dream."',sc:'When hiring or motivating TLs, do you lead with job description (What) or mission (Why)?',a:'In your next team huddle, start with: "Here\'s why what we do matters..." before diving into tasks.',tags:['leadership','persuasion','communication'],cn:1},
{ch:'Ch 2: Trust and Loyalty',type:'concept',t:'The Split',i:'As organizations grow, they lose touch with their WHY. Decisions shift from purpose-driven to metric-driven. This is "The Split."',s:'A company started with passion for customer service. After scaling, every decision became about cost reduction. Culture collapsed.',sc:'Has your team\'s WHY gotten lost behind SLA metrics and scorecards?',a:'Ask your team this week: "Why does our work matter beyond the numbers?"',tags:['leadership','self-awareness'],cn:2},
{ch:'Ch 2: Trust and Loyalty',type:'quote',t:'Working hard for something we don\'t care about is stress. Working hard for something we love is passion.',i:'The difference between burnout and engagement is purpose. Same effort, opposite experience.',s:'',sc:'A TL is working 12-hour shifts but looks exhausted vs energized. Is it the hours or the missing Why?',a:'Check in with yourself: which parts of your work energize you? Those connect to your Why.',tags:['self-awareness','leadership','mindset'],cn:2}
]);
a('radicalcandor','Radical Candor','Give feedback that\'s both caring and direct',[
{ch:'Ch 1: The Framework',type:'framework',t:'The Radical Candor Matrix',i:'Good feedback requires both: caring personally AND challenging directly. Miss one and you get Ruinous Empathy, Obnoxious Aggression, or Manipulative Insincerity.',s:'A manager liked an employee too much to give honest feedback. By the time problems surfaced, termination was the only option. Ruinous Empathy.',sc:'You know a TL is underperforming but they\'re going through a tough time. Ruinous Empathy tempts you to stay quiet. What\'s the Radically Candid move?',a:'Think of feedback you\'ve been withholding. Schedule the conversation for this week.',tags:['leadership','communication'],cn:1,fw:'💚 RADICAL CANDOR\n→ Care + Challenge\n\n😊 RUINOUS EMPATHY\n→ Care but no Challenge\n\n😤 OBNOXIOUS AGGRESSION\n→ Challenge but no Care\n\n🐍 MANIPULATIVE INSINCERITY\n→ Neither Care nor Challenge'},
{ch:'Ch 1: The Framework',type:'concept',t:'Praise in Public, Criticize in Private',i:'Public criticism humiliates. Private feedback respects dignity. Public praise motivates the whole team.',s:'A manager called out an error in a team meeting. The employee never spoke up in meetings again. Private feedback would have fixed the error without destroying psychological safety.',sc:'Your TL made a visible mistake during a client call. How and when do you address it?',a:'Give one piece of private, specific feedback today. Be direct AND kind.',tags:['communication','leadership'],cn:1},
{ch:'Ch 2: Giving Feedback',type:'concept',t:'The SBI Model for Feedback',i:'Structure feedback as: Situation (when/where), Behavior (what they did, observable), Impact (what happened as a result). No judgments, no labels.',s:'Instead of "You\'re unprofessional," try "In yesterday\'s meeting (Situation), when you interrupted the client (Behavior), they stopped sharing concerns (Impact)."',sc:'A TL is dismissive during stand-ups. Script the SBI feedback.',a:'Prepare one piece of feedback using SBI format. Notice how removing judgment changes the message.',tags:['communication','leadership','persuasion'],cn:2},
{ch:'Ch 2: Giving Feedback',type:'concept',t:'Ask for Feedback Before Giving It',i:'If you want to build a feedback culture, start by asking for feedback on yourself. This models vulnerability and makes giving feedback normal.',s:'A CEO started every 1:1 with "What could I do or stop doing to make your work easier?" Within months, the whole company adopted feedback as a norm.',sc:'When did you last genuinely ask a TL: "What should I do differently?"',a:'In your next 1:1, ask first: "What\'s one thing I could do better as your manager?"',tags:['leadership','communication','self-awareness'],cn:2}
]);
a('thescienceofgettingrich','The Science of Getting Rich','Apply focused thinking and purpose to wealth creation',[
{ch:'Ch 1: Thinking in the Certain Way',type:'concept',t:'The Certain Way of Thinking',i:'Success comes not from doing certain things, but from doing things in a Certain Way — with clear vision, purpose, gratitude, and unwavering faith.',s:'Two people in the same business — one thrives, one fails. The difference isn\'t talent or luck but mental approach.',sc:'You and another ops manager face the same challenges. What "certain way" of thinking separates outcomes?',a:'Before starting work today, spend 2 minutes clearly visualizing your desired outcome for the day.',tags:['mindset','self-awareness','productivity'],cn:1},
{ch:'Ch 1: Thinking in the Certain Way',type:'concept',t:'The Creative vs Competitive Mind',i:'Don\'t compete for existing resources — create new value. The competitive mind sees scarcity. The creative mind sees opportunity.',s:'Instead of fighting over the same clients, one company created an entirely new service category. No competition.',sc:'Your team competes with another shift for recognition. How do you shift from competitive to creative thinking?',a:'Identify one area where you\'re competing. Reframe it: what new value could you CREATE instead?',tags:['mindset','leadership','decision-making'],cn:1},
{ch:'Ch 2: Gratitude and Vision',type:'concept',t:'Gratitude as a Success Multiplier',i:'Gratitude connects you to the source of abundance. Without it, you focus on what\'s missing. With it, you attract more of what\'s working.',s:'A leader who started each meeting with "what went right this week" saw team morale and output rise steadily.',sc:'Your team meetings focus on problems. What if you started every huddle with 2 minutes of wins?',a:'Before bed tonight, write 3 things from today you\'re genuinely grateful for.',tags:['mindset','leadership','self-awareness'],cn:2},
{ch:'Ch 2: Gratitude and Vision',type:'quote',t:'Every person who gets rich does so by doing things in a Certain Way',i:'Success is methodical, not magical. It follows principles anyone can learn and apply consistently.',s:'',sc:'What\'s the "certain way" that your best TL operates that others don\'t? Can it be taught?',a:'Study your most effective habit. What makes it work? Apply that certainty to one new area.',tags:['mindset','productivity','self-awareness'],cn:2}
]);
a('nobsmarketingtotheaffluentnoholdsbakretakenoprisonersguidetogettingreallyrich','No B.S. Marketing to the Affluent','Market premium services and attract high-value clients',[
{ch:'Ch 1: Understanding Affluent Psychology',type:'concept',t:'The Affluent Buy Differently',i:'Wealthy buyers don\'t compare prices — they compare experiences, exclusivity, and status signals. Selling to them requires inverting every instinct about discounting.',s:'A luxury hotel raised prices 40% and occupancy went UP. The higher price was the quality signal.',sc:'If your company offered a premium tier at 3x the price with white-glove service, which clients would pay it?',a:'Identify one service your team provides that could be positioned as "premium" with added value, not discounts.',tags:['persuasion','decision-making','mindset'],cn:1},
{ch:'Ch 1: Understanding Affluent Psychology',type:'concept',t:'Time is the Affluent\'s True Currency',i:'Rich people will pay any amount to save time, avoid hassle, and eliminate friction. Speed and convenience beat price every time.',s:'A document service added "guaranteed 24-hour turnaround" at premium pricing. High-value clients chose it exclusively.',sc:'What would your service look like if you designed it to save your best clients\' time above everything else?',a:'Map one client workflow. Find the biggest time-waster for THEM, not you. Solve that first.',tags:['persuasion','productivity','leadership'],cn:1},
{ch:'Ch 2: Marketing Principles',type:'framework',t:'The Dan Kennedy Triangle',i:'Every successful marketing message needs: the right Market, the right Message, and the right Media. Miss one and it fails.',s:'A brilliant ad in the wrong magazine = zero response. A mediocre ad to the perfect audience = great response.',sc:'Your company recruits clients. Are you reaching the right market with the right message through the right channel?',a:'For your most important audience, write down: Who exactly are they? What do they fear/want? Where do they pay attention?',tags:['persuasion','decision-making'],cn:2,fw:'👥 MARKET → Who exactly?\n💬 MESSAGE → What resonates?\n📡 MEDIA → Where are they?'},
{ch:'Ch 2: Marketing Principles',type:'concept',t:'Sell the Result, Not the Process',i:'Affluent buyers don\'t care HOW you do it. They care about the OUTCOME. Sell the destination, not the vehicle.',s:'Nobody buys a drill because they want a drill. They buy it because they want a hole in the wall.',sc:'Your sales team explains processes and features. How do you train them to sell outcomes instead?',a:'Rewrite one pitch line: replace what you DO with what the client GETS.',tags:['persuasion','communication','leadership'],cn:2}
]);

async function genBook(){
const title=document.getElementById('bTitleIn').value.trim(),purpose=document.getElementById('bPurpIn').value.trim();
if(!title)return;
document.getElementById('abForm').style.display='none';document.getElementById('abLoad').classList.add('show');
const steps=['Analyzing structure','Extracting concepts','Creating challenges','Building actions','Organizing chapters'];
let si=0;const iv=setInterval(()=>{si=(si+1)%steps.length;const e=document.getElementById('abStep');if(e)e.textContent=steps[si]},2500);
try{
const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,
messages:[{role:'user',content:`Generate learning cards for "${title}". Learner: operations manager overseeing Team Leads, 100-200 employees at a hospital document management company. Purpose: "${purpose||'Apply in daily work'}".

Generate EXACTLY 10 cards across 3-4 chapters. Return ONLY valid JSON, no markdown, no backticks.

{"cards":[{"id":"unique_id","chapter":"Ch N: Theme","cardType":"concept|framework|quote","conceptTitle":"Short title","insight":"2-3 sentences max 50 words","storyAnchor":"Brief example or empty string for quotes","situationChallenge":"Scenario from operations/TL management","actionPrompt":"One micro-action for today","tags":["2-3 from: communication,leadership,persuasion,decision-making,self-awareness,productivity,habits,mindset"],"chapterNum":1,"frameworkVisual":"For frameworks: emoji text diagram. Empty string otherwise."}]}

Rules: 6 concepts, 2 frameworks (with frameworkVisual), 2 quotes. chapterNum matches chapter order.`}]})});
const data=await r.json();clearInterval(iv);
if(!data.content||!data.content[0])throw new Error('No response');
let txt=data.content[0].text||'';txt=txt.replace(/```json|```/g,'').trim();
const parsed=JSON.parse(txt);
if(!parsed.cards)throw new Error('Bad format');
const pi=state.books.length%PALETTES.length;
const nb={id:'book-'+Date.now(),title,purpose:purpose||'',palette:pi,chaptersUnlocked:1,diagnostic:[],
cards:parsed.cards.map(c=>({...c,status:'new',srs:{interval:0,ease:2.5,next:Date.now(),reps:0},useLogs:[],tags:c.tags||[],frameworkVisual:c.frameworkVisual||'',storyAnchor:c.storyAnchor||''}))};
state.books.push(nb);selectedBookIdx=state.books.length-1;save();closeAddBook();renderAll();
toast(`"${title}" added with ${nb.cards.length} concepts!`);
}catch(e){clearInterval(iv);console.error(e);
const fb=(()=>{const k=title.toLowerCase().replace(/[^a-z0-9]/g,'');if(FALLBACK_BOOKS[k])return FALLBACK_BOOKS[k];for(const[key,val]of Object.entries(FALLBACK_BOOKS)){if(k.includes(key.slice(0,8))||key.includes(k.slice(0,8)))return val}return null})();
const pi=state.books.length%PALETTES.length;
if(fb){
state.books.push({id:'book-'+Date.now(),title:fb.title,purpose:purpose||fb.purpose||'',palette:pi,chaptersUnlocked:1,diagnostic:[],
cards:fb.cards.map((c,i)=>mc('fb'+Date.now()+'_'+i,c.ch,c.type,c.t,c.i,c.s,c.sc,c.a,c.tags,c.cn,c.fw))});
selectedBookIdx=state.books.length-1;save();closeAddBook();renderAll();
toast(`"${fb.title}" added with ${fb.cards.length} concepts!`);
}else{
state.books.push({id:'book-'+Date.now(),title,purpose:purpose||'',palette:pi,chaptersUnlocked:1,diagnostic:[],
cards:[
mc('g'+Date.now()+'_0','Ch 1: Core Ideas','concept','Key concept from '+title,'This card will be populated with insights. Try regenerating when online or ask Claude to generate cards.','','How would you apply the core thesis to your team?','Look up one key idea from this book and try applying it today.',['self-awareness','leadership'],1),
mc('g'+Date.now()+'_1','Ch 1: Core Ideas','concept','Core Framework','Identify the main framework this book teaches. What are its key components?','Think of a framework you already use at work — how does this book\'s approach differ?','Apply one element of this framework to a TL conversation this week.','Write down the 3 most important takeaways from Chapter 1.',['leadership','decision-making'],1)
]});
selectedBookIdx=state.books.length-1;save();closeAddBook();renderAll();
toast('Added — for richer cards, try again when online or open in claude.ai')}}}

// ASSESSMENT
function openAssess(){
const m=masteryByTag(),ov=overallMastery(),a=allCards();
const mc2=a.filter(c=>c.status==='mastered').length,rc=a.filter(c=>c.status==='review').length,nc=a.filter(c=>c.status==='new').length;
const tags=Object.keys(m),sorted=Object.entries(m).sort((a,b)=>a[1]-b[1]),weak=sorted.slice(0,3),strong=sorted.slice(-2).reverse();
const nf=weak[0]?weak[0][0]:'communication';
const nextCards=a.filter(c=>c.status==='new'&&c.tags&&c.tags.includes(nf)).slice(0,3);
const radar=genRadar(tags,m);
const o=document.getElementById('assessOverlay');
o.innerHTML=`<div class="assess-content"><h1>Your Mastery Report</h1>
<div style="text-align:center;margin:8px 0 4px"><span style="font-family:var(--font-display);font-size:48px;color:#2D6A4F">${ov}%</span><div style="font-size:13px;color:var(--text3);margin-top:2px">Overall Mastery</div></div>
<div style="display:flex;justify-content:center;gap:20px;margin:12px 0 20px;font-size:13px;color:var(--text2)"><span>✅ ${mc2}</span><span>🔄 ${rc}</span><span>🆕 ${nc}</span></div>
<div class="radar-wrap">${radar}</div>
<div class="assess-summary"><h3>Strength Map</h3><div class="assess-gap">${Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([t,p])=>{const cl=p>=70?'#2D6A4F':p>=40?'#B07D2B':'#C84B31';return`<div class="assess-gap-item"><div class="assess-gap-label">${t}</div><div class="assess-gap-bar"><div class="assess-gap-fill" style="width:${p}%;background:${cl}"></div></div><div class="assess-gap-pct">${p}%</div></div>`}).join('')}</div></div>
<div class="assess-summary" style="margin-top:12px"><h3>🧭 Next Steps</h3><p style="margin-bottom:12px">Weakest: <strong>${weak[0]?weak[0][0]:'N/A'}</strong> at ${weak[0]?weak[0][1]:0}%. Focus here.</p>
${nextCards.length?`<div style="font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px">TACKLE NEXT:</div>${nextCards.map(c=>`<div style="padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;font-size:13px;cursor:pointer" onclick="closeAssess();openDetail('${c.id}')">↗ ${c.conceptTitle} <span style="color:var(--text3);font-size:11px">· ${c.bookTitle}</span></div>`).join('')}`:'<p>Keep reviewing to solidify!</p>'}</div>
${strong.length?`<div class="assess-summary" style="margin-top:12px"><h3>💪 Strengths</h3><p>Strongest: <strong>${strong[0][0]}</strong> (${strong[0][1]}%)${strong[1]?` and <strong>${strong[1][0]}</strong> (${strong[1][1]}%)`:''}</p></div>`:''}
<button class="assess-close" onclick="closeAssess()">Back to Learning</button></div>`;
o.classList.add('open')}
function closeAssess(){document.getElementById('assessOverlay').classList.remove('open')}

function genRadar(tags,m){
if(tags.length<3)return'<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">Need 3+ skill areas for radar</div>';
const s=260,cx=s/2,cy=s/2,mr=100,lv=4,n=tags.length,as=2*Math.PI/n;
let g='',ax='',lb='',dp='',dots='';
for(let l=1;l<=lv;l++){const r=(mr/lv)*l;let pts='';for(let i=0;i<n;i++){const a=as*i-Math.PI/2;pts+=`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)} `}g+=`<polygon points="${pts}" fill="none" stroke="#E8E6DF" stroke-width="1"/>`}
for(let i=0;i<n;i++){const a=as*i-Math.PI/2;ax+=`<line x1="${cx}" y1="${cy}" x2="${cx+mr*Math.cos(a)}" y2="${cy+mr*Math.sin(a)}" stroke="#E8E6DF" stroke-width="1"/>`;const lx=cx+(mr+18)*Math.cos(a),ly=cy+(mr+18)*Math.sin(a);lb+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-family="Source Sans 3,sans-serif" font-size="10" font-weight="600" fill="#9E9890">${tags[i]}</text>`;const v=(m[tags[i]]||0)/100,r=v*mr;dp+=`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)} `;dots+=`<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="4" fill="#4A55A2"/>`}
return`<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">${g}${ax}<polygon points="${dp}" fill="rgba(74,85,162,0.15)" stroke="#4A55A2" stroke-width="2"/>${lb}${dots}</svg>`}

// NAV
document.querySelectorAll('.nav-tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById(t.dataset.screen).classList.add('active');renderAll()})});

function renderAll(){renderToday();renderLearn();renderLibrary()}
window.resetBookBites=function(){localStorage.removeItem('bb2');location.reload()};
load();renderAll();
</script>
